</head>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

                    <li class="nav-item"><a class="nav-link active" href="contact.html">聯絡我</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="bg-dark text-white py-5 text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">聯絡我</h1>
            <p class="lead text-white-50">歡迎留言，雖然我應該看不到</p>
        </div>
    </section>

    <section class="py-5">
        <div class="container py-4">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    
                    

                    <div class="card p-4 p-md-5 shadow border-0 rounded-4">
                        <form action="#" method="POST" onsubmit="event.preventDefault();">
                            <div class="row g-4">
                                
                                <div class="col-md-6">
                                    <label for="userName" class="form-label fw-bold">姓名</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-secondary"></i></span>
                                        <input type="text" class="form-control bg-light border-start-0 ps-0 shadow-none" id="userName" placeholder="蕭家和" required>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="userPhone" class="form-label fw-bold">聯絡電話</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone text-secondary"></i></span>
                                        <input type="tel" class="form-control bg-light border-start-0 ps-0 shadow-none" id="userPhone" placeholder="例:0900530273" required>
                                    </div>
                                </div>

                                <div class="col-md-12">
                                    <label for="userEmail" class="form-label fw-bold">電子郵件 (Email)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-secondary"></i></span>
                                        <input type="email" class="form-control bg-light border-start-0 ps-0 shadow-none" id="userEmail" placeholder="a09005*****@email.com" required>
                                    </div>
                                </div>

                                <div class="col-md-12">
                                    <label for="userMessage" class="form-label fw-bold">留言訊息</label>
                                    <textarea class="form-control bg-light shadow-none" id="userMessage" rows="5" placeholder="請輸入您想對我說的話..." required></textarea>
                                </div>

                                <div class="col-md-12 text-end mt-4">
                                    <button type="submit" class="btn btn-warning btn-lg px-5 text-dark fw-bold custom-btn">送出留言</button>
                                </div>

                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white-50 py-4 text-center border-top border-secondary border-opacity-20">
